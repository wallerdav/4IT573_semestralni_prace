<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDB - Filmová databáze</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>🎬 IMDB Clone</h1>
            <nav>
                <button class="theme-toggle-button" onclick="toggleTheme()" id="themeToggle" aria-label="Přepnout téma">🌙</button>
                <div class="header-actions">
                    <div id="authButtons">
                        <button onclick="showLogin()">Přihlášení</button>
                        <button onclick="showRegister()">Registrace</button>
                    </div>
                    <div id="userMenu" style="display: none;">
                        <span id="username"></span>
                        <button id="profileButton" onclick="goToProfile()" style="display: none;">Profil</button>
                        <button onclick="logout()">Odhlásit</button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Vyhledávání -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Hledat filmy..." oninput="searchMovies()">
        </div>

        <div class="filters-row">
            <div class="filter-field">
                <label for="filterGenre">Žánr</label>
                <select id="filterGenre" onchange="loadMovies()">
                    <option value="">Vše</option>
                </select>
            </div>
            <div class="filter-field">
                <label for="filterYear">Rok</label>
                <select id="filterYear" onchange="loadMovies()">
                    <option value="">Vše</option>
                </select>
            </div>
            <div class="filter-field">
                <label for="filterRating">Min. hodnocení</label>
                <select id="filterRating" onchange="loadMovies()">
                    <option value="">Vše</option>
                    <option value="1">1+</option>
                    <option value="3">3+</option>
                    <option value="5">5+</option>
                    <option value="7">7+</option>
                    <option value="8">8+</option>
                    <option value="9">9+</option>
                </select>
            </div>
            <div class="filter-field">
                <label for="filterSort">Řadit podle</label>
                <select id="filterSort" onchange="loadMovies()">
                    <option value="year">Nejnovější</option>
                    <option value="popularity">Nejpopulárnější</option>
                    <option value="rating">Hodnocení</option>
                    <option value="title">Názvu</option>
                </select>
            </div>
        </div>

        <section id="recommendationsSection" class="movie-section" style="display:none;">
            <h2>Doporučeno pro vás</h2>
            <div id="recommendationsList" class="movies-grid"></div>
        </section>

        <section id="trendingSection" class="movie-section">
            <h2>Trendující filmy</h2>
            <div id="trendingList" class="movies-grid"></div>
        </section>

        <!-- Seznam filmů -->
        <div id="moviesList"></div>

        <!-- Detail filmu -->
        <div id="movieDetail" style="display: none;"></div>

        <!-- Notifikace -->
        <div id="notification" class="notification"></div>
    </main>

    <!-- Modal pro přihlášení -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>Přihlášení</h2>
            <form onsubmit="login(event)">
                <input type="text" id="loginUsername" placeholder="Uživatelské jméno" required>
                <input type="password" id="loginPassword" placeholder="Heslo" required>
                <div class="form-error" id="loginError"></div>
                <button type="submit">Přihlásit se</button>
            </form>
        </div>
    </div>

    <!-- Modal pro registraci -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2>Registrace</h2>
            <form onsubmit="register(event)">
                <input type="text" id="regUsername" placeholder="Uživatelské jméno" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Heslo (min. 6 znaků)" required>
                <div class="form-error" id="registerError"></div>
                <button type="submit">Zaregistrovat se</button>
            </form>
        </div>
    </div>
    <script src="/app.js"></script>
</body>

</html>
